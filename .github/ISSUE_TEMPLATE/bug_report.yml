name: 🐛 Bug Report
description: Report a bug to help us improve ProtoSpark
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us what you expected to happen
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    id: reproduction-steps
    attributes:
      label: 🛠️ How to reproduce?
      description: Provide a link to a reproduction or steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 💻 Environment
      description: Browser, OS, Node version, etc.
      placeholder: e.g. Chrome 120, macOS, Node v20
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: 📝 Additional context
      description: Add any other context or screenshots about the bug report here.
